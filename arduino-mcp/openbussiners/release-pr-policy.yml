name: Release PR Policy

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

jobs:
  require-release-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce release/* source branch for main
        run: |
          echo "Base branch: ${{ github.base_ref }}"
          echo "Head branch: ${{ github.head_ref }}"
          if [[ ! "${{ github.head_ref }}" =~ ^release/ ]]; then
            echo "Only release/* branches may be merged into main."
            exit 1
          fi

  validate-release-version:
    needs: require-release-source-branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base commit for version comparison
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git remote add upstream "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags upstream "$BASE_SHA" || true
          if ! git cat-file -e "$BASE_SHA^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=2000 upstream "${{ github.base_ref }}"
          fi
          git cat-file -e "$BASE_SHA^{commit}"

      - name: Validate release version policy
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.head_ref }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          node <<'NODE'
          const { execSync } = require("node:child_process");
          const fs = require("node:fs");

          const baseSha = process.env.BASE_SHA;
          const headRef = process.env.HEAD_REF || "";
          const labels = JSON.parse(process.env.PR_LABELS_JSON || "[]").map((l) => String(l).toLowerCase());

          const readVersionFromCommit = (sha, filePath) => {
            try {
              const content = execSync(`git show ${sha}:${filePath}`, { encoding: "utf8" });
              const parsed = JSON.parse(content);
              return parsed.version;
            } catch {
              return null;
            }
          };

          const normalize = (value) => {
            if (typeof value !== "string") {
              return null;
            }
            const v = value.trim();
            const semverPattern = /^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/;
            return semverPattern.test(v) ? v : null;
          };

          const parse = (value) => {
            const [core, pre = ""] = value.split("-", 2);
            const [major, minor, patch] = core.split(".").map((n) => Number.parseInt(n, 10));
            return { major, minor, patch, pre };
          };

          const compareVersions = (a, b) => {
            const pa = parse(a);
            const pb = parse(b);

            if (pa.major !== pb.major) return pa.major - pb.major;
            if (pa.minor !== pb.minor) return pa.minor - pb.minor;
            if (pa.patch !== pb.patch) return pa.patch - pb.patch;

            const aPre = pa.pre;
            const bPre = pb.pre;
            if (!aPre && !bPre) return 0;
            if (!aPre) return 1;
            if (!bPre) return -1;
            return aPre.localeCompare(bPre);
          };

          const bumpType = (base, head) => {
            const b = parse(base);
            const h = parse(head);

            if (h.major > b.major) return "major";
            if (h.major < b.major) return "invalid";

            if (h.minor > b.minor) return "minor";
            if (h.minor < b.minor) return "invalid";

            if (h.patch > b.patch) return "patch";
            if (h.patch < b.patch) return "invalid";

            if (h.pre !== b.pre) return "prerelease";
            return "none";
          };

          const inferExpectedBumpFromLabels = (allLabels) => {
            const normalized = new Set(allLabels);
            const candidates = [
              ["major", ["major", "release:major", "release/major", "version:major", "version/major"]],
              ["minor", ["minor", "release:minor", "release/minor", "version:minor", "version/minor"]],
              ["patch", ["patch", "release:patch", "release/patch", "version:patch", "version/patch"]]
            ];

            const matched = candidates
              .filter(([, keys]) => keys.some((k) => normalized.has(k)))
              .map(([name]) => name);

            if (matched.length !== 1) {
              return { expected: null, matched };
            }

            return { expected: matched[0], matched };
          };

          const baseVersionRaw = readVersionFromCommit(baseSha, "package.json");
          const headPkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const baseServerVersionRaw = readVersionFromCommit(baseSha, "server.json");
          const headServer = JSON.parse(fs.readFileSync("server.json", "utf8"));
          const baseManifestVersionRaw = readVersionFromCommit(baseSha, "manifest.json");
          const headManifest = JSON.parse(fs.readFileSync("manifest.json", "utf8"));
          const headVersionRaw = headPkg.version;
          const headServerVersionRaw = headServer.version;
          const headManifestVersionRaw = headManifest.version;
          const headServerPackageVersion = (() => {
            const targetPkg = Array.isArray(headServer.packages)
              ? headServer.packages.find((p) => p.identifier === headPkg.name) ?? headServer.packages[0]
              : null;
            return targetPkg?.version;
          })();

          const baseVersion = normalize(baseVersionRaw);
          const headVersion = normalize(headVersionRaw);
          const baseServerVersion = normalize(baseServerVersionRaw);
          const headServerVersion = normalize(headServerVersionRaw);
          const baseManifestVersion = normalize(baseManifestVersionRaw);
          const headManifestVersion = normalize(headManifestVersionRaw);
          const headServerPkgVersion = normalize(headServerPackageVersion);

          const errors = [];

          if (!baseVersion) {
            errors.push(`Base package.json version is invalid semver: ${String(baseVersionRaw)}`);
          }
          if (!headVersion) {
            errors.push(`Head package.json version is invalid semver: ${String(headVersionRaw)}`);
          }
          if (!headServerVersion) {
            errors.push(`Head server.json version is invalid semver: ${String(headServerVersionRaw)}`);
          }
          if (!headServerPkgVersion) {
            errors.push(`Head server.json packages[0].version is invalid semver: ${String(headServerPackageVersion)}`);
          }
          if (!headManifestVersion) {
            errors.push(`Head manifest.json version is invalid semver: ${String(headManifestVersionRaw)}`);
          }

          if (!baseServerVersion) {
            errors.push(`Base server.json version is invalid semver: ${String(baseServerVersionRaw)}`);
          }
          if (baseManifestVersionRaw !== null && !baseManifestVersion) {
            errors.push(`Base manifest.json version is invalid semver: ${String(baseManifestVersionRaw)}`);
          }

          if (headVersion && headServerVersion && headVersion !== headServerVersion) {
            errors.push(`package.json version (${headVersion}) must match server.json version (${headServerVersion}).`);
          }
          if (headVersion && headServerPkgVersion && headVersion !== headServerPkgVersion) {
            errors.push(`package.json version (${headVersion}) must match server.json packages[0].version (${headServerPkgVersion}).`);
          }
          if (headVersion && headManifestVersion && headVersion !== headManifestVersion) {
            errors.push(`package.json version (${headVersion}) must match manifest.json version (${headManifestVersion}).`);
          }

          if (baseVersion && headVersion) {
            if (compareVersions(headVersion, baseVersion) <= 0) {
              errors.push(`Release version must increase. Base is ${baseVersion}, head is ${headVersion}.`);
            }
          }

          const { expected: expectedBump, matched: matchedBumpLabels } = inferExpectedBumpFromLabels(labels);
          if (!expectedBump) {
            errors.push(
              `PR must have exactly one bump label: patch/minor/major (or release:patch|minor|major). Found: ${matchedBumpLabels.join(", ") || "none"}.`
            );
          } else if (baseVersion && headVersion) {
            const actualBump = bumpType(baseVersion, headVersion);
            if (actualBump !== expectedBump) {
              errors.push(
                `Version bump does not match label. Label expects ${expectedBump}, but base=${baseVersion} to head=${headVersion} is ${actualBump}.`
              );
            }
          }

          if (errors.length > 0) {
            console.error("Release version policy failed:");
            for (const err of errors) {
              console.error(`- ${err}`);
            }
            process.exit(1);
          }

          console.log(`Release version policy passed. base=${baseVersion} head=${headVersion} branch=${headRef} labels=${labels.join(",")}`);
          NODE
